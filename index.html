<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سایت : @FLOKI000</title>
    <!-- استفاده از فونت وزیرمتن برای تایپوگرافی حرفه‌ای -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    
    <style>
        :root {
            --primary-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            color: var(--primary-color);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* طراحی Glassmorphism */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 var(--glass-shadow);
            border-radius: 24px;
            padding: 40px 50px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* انیمیشن لودینگ */
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #38bdf8;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 0.95rem;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .countdown-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: #38bdf8;
            padding: 0 5px;
        }

        .manual-btn {
            margin-top: 15px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .manual-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="spinner"></div>
        <h1>در حال انتقال</h1>
        <p>شما تا <span class="countdown-number" id="timer">10</span> ثانیه دیگر به صورت خودکار به سایت <strong>ef3.ir</strong> منتقل خواهید شد.</p>
        <a href="http://ef3.ir" class="manual-btn">انتقال سریع</a>
    </div>

    <script>
        // تنظیمات تایمر
        let timeLeft = 5;
        const timerElement = document.getElementById('timer');
        const targetUrl = 'http://ef3.ir';

        // تابع شمارش معکوس
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = targetUrl;
            }
        }, 1000); // هر 1000 میلی‌ثانیه (1 ثانیه) اجرا می‌شود
    </script>

</body>
</html>
