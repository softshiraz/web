<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>در حال انتقال...</title>
    <style>
        /* ریست کردن استایل‌های پیش‌فرض */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        /* پس‌زمینه مدرن و متحرک */
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* کارت اصلی (افکت شیشه‌ای مدرن) */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* استایل متون */
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #f8fafc;
        }

        p {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* المان لودینگ دایره‌ای حرفه‌ای */
        .loader-box {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
        }

        .circular-loader {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(farthest-side, #6366f1 94%, #0000) top/8px 8px no-repeat,
                        conic-gradient(#0000 30%, #6366f1);
            -webkit-mask: radial-gradient(farthest-side, #0000 calc(100% - 8px), #000 0);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* شمارش معکوس عددی در مرکز لودینگ */
        .countdown-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.6rem;
            font-weight: bold;
            color: #38bdf8;
        }

        /* نوار پیشرفت خطی انتهای کارت */
        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #6366f1, #38bdf8);
            transform-origin: right;
            animation: progressTimeline 10s linear forwards;
        }

        @keyframes progressTimeline {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        /* دکمه انتقال دستی زودهنگام */
        .redirect-btn {
            display: inline-block;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .redirect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            background: linear-gradient(135deg, #4f46e5, #4338ca);
        }

        /* بهینه‌سازی واکنش‌گرایی برای گوشی‌های کوچک */
        @media (max-width: 400px) {
            .container {
                padding: 30px 20px;
            }
            h1 { font-size: 1.3rem; }
            p { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader-box">
            <div class="circular-loader"></div>
            <div class="countdown-number" id="countdown">۱۰</div>
        </div>

        <h1>در حال انتقال به سایت مقصد</h1>
        <p>لطفاً چند لحظه شکیبا باشید. شما تا چند ثانیه دیگر به طور خودکار به وب‌سایت مقصد هدایت خواهید شد.</p>

        <div class="progress-bar-container">
            <div class="progress-bar"></div>
        </div>

        <a href="http://Floch3.blogix.ir" class="redirect-btn">انتقال فوری به سایت</a>
    </div>

    <script>
        // آدرس سایت مقصد شما
        const targetUrl = "http://Floch3.blogix.ir";
        // زمان انتظار به ثانیه
        let timeLeft = 10; 
        
        const countdownElement = document.getElementById('countdown');

        // تبدیل اعداد انگلیسی به فارسی برای زیبایی بیشتر UI
        const toFarsiNumber = (n) => {
            const farsiDigits = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
            return n.toString().replace(/\d/g, x => farsiDigits[x]);
        }

        // سیستم شمارش معکوس و انتقال نهایی
        const timer = setInterval(() => {
            timeLeft--;
            if (timeLeft >= 0) {
                countdownElement.textContent = toFarsiNumber(timeLeft);
            }

            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = targetUrl;
            }
        }, 1000);
    </script>

</body>
</html>
